name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      CC: ${{ matrix.os == 'windows-latest' && 'gcc' || 'cc' }}
    steps:
      - uses: actions/checkout@v4

      - name: Compiler version
        run: $CC --version

      - name: Bootstrap mino
        run: |
          gen_header() {
            local src="$1"
            local sym="$2"
            local out="src/$sym.h"
            printf 'static const char *%s_src =\n' "$sym" > "$out"
            sed 's/\\/\\\\/g; s/"/\\"/g; s/^/    "/; s/$/\\n"/' "$src" >> "$out"
            printf '    ;\n' >> "$out"
          }
          gen_header src/core.clj                     core_mino
          gen_header lib/clojure/string.clj           lib_clojure_string
          gen_header lib/clojure/set.clj              lib_clojure_set
          gen_header lib/clojure/walk.clj             lib_clojure_walk
          gen_header lib/clojure/edn.clj              lib_clojure_edn
          gen_header lib/clojure/pprint.clj           lib_clojure_pprint
          gen_header lib/clojure/zip.clj              lib_clojure_zip
          gen_header lib/clojure/data.clj             lib_clojure_data
          gen_header lib/clojure/test.clj             lib_clojure_test
          gen_header lib/clojure/template.clj         lib_clojure_template
          gen_header lib/clojure/repl.clj             lib_clojure_repl
          gen_header lib/clojure/stacktrace.clj       lib_clojure_stacktrace
          gen_header lib/clojure/datafy.clj           lib_clojure_datafy
          gen_header lib/clojure/core/protocols.clj   lib_clojure_core_protocols
          gen_header lib/clojure/instant.clj          lib_clojure_instant
          gen_header lib/clojure/spec/alpha.clj       lib_clojure_spec_alpha
          gen_header lib/clojure/core/specs/alpha.clj lib_clojure_core_specs_alpha
          $CC -std=c99 -O2 \
            -Isrc -Isrc/public -Isrc/runtime -Isrc/gc -Isrc/eval \
            -Isrc/collections -Isrc/prim -Isrc/async -Isrc/interop \
            -Isrc/diag -Isrc/vendor/imath \
            -o mino_bootstrap \
            src/public/*.c src/runtime/*.c src/gc/*.c src/eval/*.c \
            src/collections/*.c src/prim/*.c src/async/*.c src/interop/*.c \
            src/regex/*.c src/diag/*.c src/vendor/imath/*.c \
            main.c -lm

      - name: Build
        run: ./mino_bootstrap task build

      - name: Test
        run: ./mino task test
        # tests usually finish in seconds; a hang means a deadlock, not
        # a slow runner. Cap so we get diagnostic output instead of
        # waiting on the 6h job-default timeout.
        timeout-minutes: 8
        # The Windows test suite has documented divergence: cmd.exe's
        # echo emits a trailing space before \n, which the proc-test
        # assertions do not strip. Build still must pass; tests are
        # informational on Windows until the suite is portable.
        continue-on-error: ${{ matrix.os == 'windows-latest' }}

  perf-gate:
    name: perf-gate (linux)
    runs-on: ubuntu-latest
    needs: build
    # Shared GitHub-hosted runners are CPU-noisy and the runner image
    # itself drifts (ubuntu-latest tracks the newest stable image), so
    # the perf-gate is informational here. Local runs and the dedicated
    # mino-bench workflow remain the authoritative signal.
    continue-on-error: true
    steps:
      - name: Checkout mino at current SHA
        uses: actions/checkout@v4
        with:
          path: mino-head

      - name: Checkout mino-bench
        uses: actions/checkout@v4
        with:
          repository: leifericf/mino-bench
          path: mino-bench
          submodules: recursive

      - name: Override mino submodule to this SHA
        working-directory: mino-bench
        run: |
          rm -rf mino
          cp -R ../mino-head mino

      - name: Bootstrap mino
        working-directory: mino-bench/mino
        run: |
          gen_header() {
            local src="$1"
            local sym="$2"
            local out="src/$sym.h"
            printf 'static const char *%s_src =\n' "$sym" > "$out"
            sed 's/\\/\\\\/g; s/"/\\"/g; s/^/    "/; s/$/\\n"/' "$src" >> "$out"
            printf '    ;\n' >> "$out"
          }
          gen_header src/core.clj                     core_mino
          gen_header lib/clojure/string.clj           lib_clojure_string
          gen_header lib/clojure/set.clj              lib_clojure_set
          gen_header lib/clojure/walk.clj             lib_clojure_walk
          gen_header lib/clojure/edn.clj              lib_clojure_edn
          gen_header lib/clojure/pprint.clj           lib_clojure_pprint
          gen_header lib/clojure/zip.clj              lib_clojure_zip
          gen_header lib/clojure/data.clj             lib_clojure_data
          gen_header lib/clojure/test.clj             lib_clojure_test
          gen_header lib/clojure/template.clj         lib_clojure_template
          gen_header lib/clojure/repl.clj             lib_clojure_repl
          gen_header lib/clojure/stacktrace.clj       lib_clojure_stacktrace
          gen_header lib/clojure/datafy.clj           lib_clojure_datafy
          gen_header lib/clojure/core/protocols.clj   lib_clojure_core_protocols
          gen_header lib/clojure/instant.clj          lib_clojure_instant
          gen_header lib/clojure/spec/alpha.clj       lib_clojure_spec_alpha
          gen_header lib/clojure/core/specs/alpha.clj lib_clojure_core_specs_alpha
          cc -std=c99 -O2 \
            -Isrc -Isrc/public -Isrc/runtime -Isrc/gc -Isrc/eval \
            -Isrc/collections -Isrc/prim -Isrc/async -Isrc/interop \
            -Isrc/diag -Isrc/vendor/imath \
            -o mino \
            src/public/*.c src/runtime/*.c src/gc/*.c src/eval/*.c \
            src/collections/*.c src/prim/*.c src/async/*.c src/interop/*.c \
            src/regex/*.c src/diag/*.c src/vendor/imath/*.c \
            main.c -lm

      - name: Build bench binaries
        working-directory: mino-bench
        run: ./mino/mino task build

      - name: Run perf gate
        working-directory: mino-bench
        run: ./mino/mino task perf-gate

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      CC: ${{ matrix.os == 'windows-latest' && 'gcc' || 'cc' }}
    steps:
      - uses: actions/checkout@v4

      - name: Compiler version
        run: $CC --version

      - name: Bootstrap mino
        run: |
          printf 'static const char *core_mino_src =\n' > src/core_mino.h
          sed 's/\\/\\\\/g; s/"/\\"/g; s/^/    "/; s/$/\\n"/' src/core.mino >> src/core_mino.h
          printf '    ;\n' >> src/core_mino.h
          $CC -std=c99 -O2 -Isrc -o mino_bootstrap src/*.c src/vendor/*.c main.c -lm

      - name: Build
        run: ./mino_bootstrap task build

      - name: Test
        run: ./mino task test

  perf-gate:
    name: perf-gate (linux)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout mino at current SHA
        uses: actions/checkout@v4
        with:
          path: mino-head

      - name: Checkout mino-bench
        uses: actions/checkout@v4
        with:
          repository: leifericf/mino-bench
          path: mino-bench
          submodules: recursive

      - name: Override mino submodule to this SHA
        working-directory: mino-bench
        run: |
          rm -rf mino
          cp -R ../mino-head mino

      - name: Bootstrap mino
        working-directory: mino-bench/mino
        run: |
          printf 'static const char *core_mino_src =\n' > src/core_mino.h
          sed 's/\\/\\\\/g; s/"/\\"/g; s/^/    "/; s/$/\\n"/' src/core.mino >> src/core_mino.h
          printf '    ;\n' >> src/core_mino.h
          cc -std=c99 -O2 -Isrc -o mino src/*.c src/vendor/*.c main.c -lm

      - name: Build bench binaries
        working-directory: mino-bench
        run: ./mino/mino task build

      - name: Run perf gate
        working-directory: mino-bench
        run: ./mino/mino task perf-gate

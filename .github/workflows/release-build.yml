name: release-build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform }}
    strategy:
      # Don't fail-fast: one slow or flaky platform shouldn't cancel
      # the others mid-matrix and block the draft release.
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-22.04
            os: linux
            arch: amd64
            ext: tar.gz
            exe: ""
          - platform: linux-arm64
            runner: ubuntu-22.04-arm
            os: linux
            arch: arm64
            ext: tar.gz
            exe: ""
          - platform: darwin-amd64
            runner: macos-15-intel
            os: darwin
            arch: amd64
            ext: tar.gz
            exe: ""
          - platform: darwin-arm64
            runner: macos-15
            os: darwin
            arch: arm64
            ext: tar.gz
            exe: ""
          - platform: windows-amd64
            runner: windows-latest
            os: windows
            arch: amd64
            ext: zip
            exe: ".exe"
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    env:
      CC: ${{ matrix.os == 'windows' && 'gcc' || 'cc' }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches src/mino.h
        run: |
          src_ver="v$(awk '
            /^#define MINO_VERSION_MAJOR/ {maj=$3}
            /^#define MINO_VERSION_MINOR/ {min=$3}
            /^#define MINO_VERSION_PATCH/ {pat=$3}
            END {print maj"."min"."pat}
          ' src/mino.h)"
          tag_base="${TAG%%-*}"
          if [ "$src_ver" != "$tag_base" ]; then
            echo "Tag $TAG (base $tag_base) does not match src/mino.h version $src_ver" >&2
            exit 1
          fi
          echo "Tag $TAG matches source version $src_ver"

      - name: Bootstrap mino
        # The Makefile detects Windows via $(OS) and produces mino.exe
        # there, mino elsewhere; matches matrix.exe by construction.
        # Tee the output so a build break leaves a downloadable
        # artifact even though release-build runs on tags only.
        run: |
          set -o pipefail
          make 2>&1 | tee /tmp/build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.platform }}
          path: /tmp/build.log
          retention-days: 7

      - name: Smoke test
        run: |
          "./mino${{ matrix.exe }}" --version
          out=$("./mino${{ matrix.exe }}" -e '(+ 1 2)')
          if [ "$out" != "3" ]; then
            echo "Smoke test failed: expected '3', got '$out'" >&2
            exit 1
          fi

      - name: Stage release directory
        run: |
          dir="mino_${{ matrix.os }}_${{ matrix.arch }}_${TAG}"
          mkdir -p "$dir"
          cp "mino${{ matrix.exe }}" "$dir/"
          cp LICENSE "$dir/"
          sed \
            -e "s/__VERSION__/${TAG}/g" \
            -e "s/__OS__/${{ matrix.os }}/g" \
            -e "s/__ARCH__/${{ matrix.arch }}/g" \
            .github/release-templates/release-readme.md > "$dir/README.md"
          echo "STAGE_DIR=$dir" >> "$GITHUB_ENV"

      - name: Archive
        run: |
          if [ "${{ matrix.ext }}" = "zip" ]; then
            7z a -tzip "${STAGE_DIR}.zip" "${STAGE_DIR}" >/dev/null
          else
            tar -czf "${STAGE_DIR}.tar.gz" "${STAGE_DIR}"
          fi
          ls -la "${STAGE_DIR}.${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: mino_${{ matrix.os }}_${{ matrix.arch }}_${{ github.ref_name }}.${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 7

  # Parallel validation: cross-compile the Linux (musl-static +
  # glibc-canary) and Windows binaries from ONE Linux host with the
  # pinned zig cc and smoke-test them. This runs ALONGSIDE the native
  # `build` matrix above -- it does not replace it and does not feed the
  # published artifacts (publish-draft needs: build only). It proves the
  # optional `cross-build` path keeps working and guards two properties:
  # the musl Linux artifacts are fully static (zero NEEDED), and the
  # cross-built Windows PE imports no mingw runtime DLLs (retiring the
  # -static hack). macOS is absent on purpose (Zig bundles no macOS SDK;
  # darwin stays a native build).
  cross-build-validate:
    name: cross-build-validate (linux host -> linux+windows)
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Zig
        # Must match zig-version-pin in lib/mino/tasks/builtin.clj.
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Bootstrap mino
        run: make

      - name: Cross-build Linux + Windows
        run: ./mino task cross-build

      - name: Smoke test linux-amd64 musl (runs natively, static)
        # The musl + -static binary is the published standalone artifact.
        # It runs natively on the x86_64 runner; the cross-build task
        # already asserted 0 NEEDED, re-assert here as the release gate.
        run: |
          ./dist-cross/mino_linux_amd64_musl --version
          out=$(./dist-cross/mino_linux_amd64_musl -e '(+ 1 2)')
          [ "$out" = "3" ] || { echo "linux-amd64-musl smoke failed: got '$out'" >&2; exit 1; }
          if readelf -d ./dist-cross/mino_linux_amd64_musl | grep -q 'NEEDED'; then
            echo "linux-amd64-musl is not statically linked" >&2; exit 1
          fi
          echo "linux-amd64-musl: static + runs OK"

      - name: Sanity-check linux-arm64 musl object format + static
        # The x86_64 runner can't execute the arm64 binary without an
        # emulator; assert it's a well-formed, statically linked AArch64
        # ELF. Native execution smoke is covered by the linux-arm64
        # matrix entry.
        run: |
          readelf -h ./dist-cross/mino_linux_arm64_musl | grep -q 'AArch64' \
            || { echo "linux-arm64-musl is not an AArch64 ELF" >&2; exit 1; }
          if readelf -d ./dist-cross/mino_linux_arm64_musl | grep -q 'NEEDED'; then
            echo "linux-arm64-musl is not statically linked" >&2; exit 1
          fi
          echo "linux-arm64-musl: static AArch64 ELF OK"

      - name: Smoke test linux-amd64 glibc canary (runs natively)
        # The glibc build is a build-only portability canary (not
        # published); confirm it still links and runs.
        run: |
          out=$(./dist-cross/mino_linux_amd64 -e '(+ 1 2)')
          [ "$out" = "3" ] || { echo "linux-amd64 glibc smoke failed: got '$out'" >&2; exit 1; }
          echo "linux-amd64 glibc canary: runs OK"

      - name: Assert Windows PE has no mingw runtime-DLL dependency
        # The whole point of the zig/mingw path vs the Makefile -static
        # hack: the PE must import only the system Universal CRT +
        # KERNEL32, never libgcc_s_seh-1.dll / libwinpthread-1.dll
        # (which cause STATUS_DLL_NOT_FOUND on a clean Windows box).
        # ubuntu's objdump reads PE import tables.
        run: |
          objdump -p ./dist-cross/mino_windows_amd64.exe \
            | grep -i 'DLL Name' | sort -u
          if objdump -p ./dist-cross/mino_windows_amd64.exe \
               | grep -iE 'DLL Name: *(libgcc|libwinpthread)'; then
            echo "Windows PE depends on mingw runtime DLLs -- regression" >&2
            exit 1
          fi
          echo "windows-amd64: no mingw runtime-DLL imports OK"

      # Phase-C: package the zero-dependency musl-static Linux binaries as
      # release artifacts. These are ADDITIVE -- they publish alongside the
      # native glibc Linux builds (artifact names carry a `_musl` suffix so
      # they never collide), giving users a single-file binary that runs on
      # any Linux (glibc, musl/Alpine, old or new) with nothing installed.
      # The native matrix stays the source of the glibc artifacts and the
      # portability canary; once the musl artifacts have proven out across
      # releases, a later change can make musl the primary Linux download.
      - name: Stage + archive musl-static Linux artifacts
        run: |
          for arch in amd64 arm64; do
            bin="dist-cross/mino_linux_${arch}_musl"
            dir="mino_linux_${arch}_musl_${TAG}"
            mkdir -p "$dir"
            cp "$bin" "$dir/mino"
            cp LICENSE "$dir/"
            sed \
              -e "s/__VERSION__/${TAG}/g" \
              -e "s/__OS__/linux/g" \
              -e "s/__ARCH__/${arch} (musl static)/g" \
              .github/release-templates/release-readme.md > "$dir/README.md"
            tar -czf "${dir}.tar.gz" "$dir"
            ls -la "${dir}.tar.gz"
          done

      - name: Upload musl-static Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-musl-static
          path: mino_linux_*_musl_${{ github.ref_name }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  publish-draft:
    name: publish draft release
    needs: [build, cross-build-validate]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums.txt
        working-directory: dist
        run: |
          shasum -a 256 mino_* > checksums.txt
          cat checksums.txt

      - name: Create draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            dist/mino_*
            dist/checksums.txt
